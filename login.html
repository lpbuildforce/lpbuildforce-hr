<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR Portal Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#0057B8,#003366);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:white;
width:380px;
padding:35px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,.25);
text-align:center;
}

.logo{
width:120px;
margin-bottom:15px;
}

h2{
color:#0057B8;
margin-bottom:10px;
}

p{
color:#666;
margin-bottom:25px;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
}

button{
width:100%;
padding:12px;
background:#FFC107;
color:#003366;
border:none;
border-radius:8px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#ffb300;
}

.error{
color:red;
margin-top:10px;
font-size:14px;
}

</style>
</head>

<body>

<div class="login-box">

<img src="logo.png" class="logo">

<h2>HR & Admin Portal</h2>

<p>Authorized Personnel Only</p>

<input type="text" id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">LOGIN</button>

<p class="error" id="error"></p>

</div>

<script>

function login(){

const username=document.getElementById("username").value;
const password=document.getElementById("password").value;

if(username==="admin" && password==="Lp2026"){

window.location.href="index.html";

}else{

document.getElementById("error").innerHTML="Incorrect username or password.";

}

}

</script>

</body>
</html>
